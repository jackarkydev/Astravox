name: Build Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  RACK_PLUGIN_TOOLCHAIN_DIR: /home/build/rack-plugin-toolchain
  RACK_SDK_VERSION: 2.6.6

defaults:
  run:
    shell: bash

jobs:
  # Linux and Windows: cross-compile inside the rack-plugin-toolchain Docker
  # container. This matches the local development workflow exactly and avoids
  # CRT mismatch issues from native Windows builds.
  build-win-lin:
    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/qno/rack-plugin-toolchain-win-linux
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        platform: [win-x64, lin-x64]
    steps:
      - uses: actions/checkout@v4
      - name: Build plugin
        run: |
          export PLUGIN_DIR=$GITHUB_WORKSPACE
          pushd ${{ env.RACK_PLUGIN_TOOLCHAIN_DIR }}
          make plugin-build-${{ matrix.platform }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.platform }}
          path: ${{ env.RACK_PLUGIN_TOOLCHAIN_DIR }}/plugin-build/*.vcvplugin

  # macOS: build on macos-latest (arm64 runner). The arm64 build is native;
  # the x64 build uses CROSS_COMPILE with the x64 Rack SDK. Per-arch SDKs are
  # used because vcvrack.com doesn't ship a universal SDK for pinned versions.
  build-mac:
    name: mac-${{ matrix.platform }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Download Rack SDK
        run: |
          curl -fsSL "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-mac-${{ matrix.platform }}.zip" -o rack-sdk.zip
          unzip rack-sdk.zip
      - name: Build plugin
        run: |
          export RACK_DIR="$GITHUB_WORKSPACE/Rack-SDK"
          if [ "${{ matrix.platform }}" = "x64" ]; then
            export CROSS_COMPILE=x86_64-apple-darwin
          fi
          make dist
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-mac-${{ matrix.platform }}
          path: dist/*.vcvplugin

  release:
    needs: [build-win-lin, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.vcvplugin
          generate_release_notes: true
