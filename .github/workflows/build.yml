name: Build Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  RACK_SDK_VERSION: 2.6.6
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: lin-x64
            sdk_arch: lin-x64
          - os: macos-latest
            arch: mac-arm64
            sdk_arch: mac-arm64
          - os: macos-13
            arch: mac-x64
            sdk_arch: mac-x64
          - os: windows-latest
            arch: win-x64
            sdk_arch: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Rack SDK
        shell: bash
        run: |
          curl -fsSL "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-${{ matrix.sdk_arch }}.zip" -o rack-sdk.zip
          unzip rack-sdk.zip

      - name: Build plugin
        shell: bash
        run: make dist RACK_DIR="$GITHUB_WORKSPACE/Rack-SDK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.arch }}
          path: dist/*.vcvplugin

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.vcvplugin
          generate_release_notes: true
