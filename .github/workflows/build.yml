name: Build Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  RACK_SDK_VERSION: 2.6.6
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: lin-x64
            sdk_arch: lin-x64
          - os: macos-latest
            arch: mac-arm64
            sdk_arch: mac-arm64
          - os: windows-latest
            arch: win-x64
            sdk_arch: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Use MSYS2 MINGW64 on Windows so the plugin links against msvcrt.dll
      # (legacy MSVC CRT), matching the runtime VCV Rack itself ships.
      # Git Bash's MinGW on GitHub runners targets UCRT, which causes a
      # CRT mismatch and crash when Rack instantiates the module.
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: make mingw-w64-x86_64-gcc mingw-w64-x86_64-zstd

      - name: Download Rack SDK
        shell: bash
        run: |
          curl -fsSL "https://vcvrack.com/downloads/Rack-SDK-${{ env.RACK_SDK_VERSION }}-${{ matrix.sdk_arch }}.zip" -o rack-sdk.zip
          unzip rack-sdk.zip

      - name: Build plugin (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: make dist RACK_DIR="$GITHUB_WORKSPACE/Rack-SDK"

      - name: Build plugin (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make dist RACK_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/Rack-SDK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.arch }}
          path: dist/*.vcvplugin

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.vcvplugin
          generate_release_notes: true
